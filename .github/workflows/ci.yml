name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION: CurrencyRates.GatewayService.sln

jobs:
  build-test-format:
    name: Build / Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION }}"

      - name: Format (verify)
        run: dotnet format "${{ env.SOLUTION }}" --verify-no-changes --severity warn --no-restore

      - name: Build
        run: dotnet build "${{ env.SOLUTION }}" -c Release --no-restore

  inspectcode:
    name: InspectCode (ReSharper)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install JetBrains ReSharper Global Tools
        run: dotnet tool install -g JetBrains.ReSharper.GlobalTools

      - name: InspectCode
        run: |
          jb inspectcode "${{ env.SOLUTION }}" \
            --build \
            --output=inspectcode-report.xml \
            --format=Xml \
            --severity=ERROR \
            --fail-on-issue \
            --caches-home="${{ runner.temp }}/inspectcode-cache"

      - name: Upload InspectCode report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspectcode-report
          path: inspectcode-report.xml
          if-no-files-found: ignore
